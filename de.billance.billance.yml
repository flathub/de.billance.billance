app-id: de.billance.billance
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: billance
separate-locales: false

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --env=ELECTRON_TRASH=gio

modules:
  - name: billance
    buildsystem: simple
    build-commands:
      - mkdir -p /app/main
      - cp -a app/. /app/main
      - patch-electron-desktop-filename /app/main/resources/app.asar --desktop-filename de.billance.billance.desktop
      - install -Dm755 billance-wrapper.sh /app/bin/billance
      - install -Dm644 app/de.billance.billance.desktop /app/share/applications/de.billance.billance.desktop
      - install -Dm644 app/de.billance.billance.metainfo.xml /app/share/metainfo/de.billance.billance.metainfo.xml
      - install -Dm644 app/de.billance.billance.svg /app/share/icons/hicolor/scalable/apps/de.billance.billance.svg
      - install -Dm644 app/LICENSE.proprietary.txt /app/share/licenses/de.billance.billance/LICENSE.proprietary.txt
    sources:
      - type: archive
        url: https://billance.de/downloads/flatpak/2026.1.0/Billance-2026.1.0-linux-x86_64-flatpak-extra-data.tar.gz
        sha256: 46f6a6fc8f7d1592ce4bcfccf0836b7e9cf12720bd1c1e51e413702d7b20fef2
        dest: app
        strip-components: 0
        only-arches:
          - x86_64
      - type: archive
        url: https://billance.de/downloads/flatpak/2026.1.0/Billance-2026.1.0-linux-aarch64-flatpak-extra-data.tar.gz
        sha256: 1dc1cfa66404b06befc3c0f4147b432c4303d236d6db0e0e152231b13e17e84b
        dest: app
        strip-components: 0
        only-arches:
          - aarch64
      - type: file
        path: billance-wrapper.sh
