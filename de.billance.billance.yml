app-id: de.billance.billance
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: billance
separate-locales: false

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=x11
  - --share=network
  - --env=ELECTRON_TRASH=gio
  # Invoices are written to the user's Documents folder (or any home-based
  # output folder the user configures); without this the sandbox can't read
  # back already-generated invoices and viewing fails with
  # "Invalid or missing file path".
  - --filesystem=home

modules:
  - name: billance
    buildsystem: simple
    build-commands:
      - install -Dm755 billance-wrapper.sh /app/bin/billance
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm644 de.billance.billance.desktop /app/share/applications/de.billance.billance.desktop
      - install -Dm644 de.billance.billance.metainfo.xml /app/share/metainfo/de.billance.billance.metainfo.xml
      - install -Dm644 de.billance.billance.svg /app/share/icons/hicolor/scalable/apps/de.billance.billance.svg
      - install -Dm644 LICENSE.proprietary.txt /app/share/licenses/de.billance.billance/LICENSE.proprietary.txt
    sources:

      - type: extra-data
        filename: Billance-2026.1.0-linux-x86_64-flatpak-extra-data.tar.gz
        only-arches:
          - x86_64
        url: https://billance.de/downloads/flatpak/2026.1.0/Billance-2026.1.0-linux-x86_64-flatpak-extra-data.tar.gz
        sha256: 42994701e8636924626c56c786a843edc874bd02448228cc6f4502e72cc510b6
        size: 151050779


      - type: extra-data
        filename: Billance-2026.1.0-linux-aarch64-flatpak-extra-data.tar.gz
        only-arches:
          - aarch64
        url: https://billance.de/downloads/flatpak/2026.1.0/Billance-2026.1.0-linux-aarch64-flatpak-extra-data.tar.gz
        sha256: 4aec4a8687fa02bab4fc90d61e70530877e3431a3b46ecfd3bbe9e4703e4ab51
        size: 151482122

      - type: file
        path: billance-wrapper.sh
      - type: file
        path: apply_extra.sh
      - type: file
        path: de.billance.billance.desktop
      - type: file
        path: de.billance.billance.metainfo.xml
      - type: file
        path: de.billance.billance.svg
      - type: file
        path: LICENSE.proprietary.txt
        dest-filename: LICENSE.proprietary.txt
