app-id: de.billance.billance
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: billance
separate-locales: false

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --env=ELECTRON_TRASH=gio
  # Invoices are written to the user's Documents folder so they stay visible on
  # the host and can be opened/revealed in the file manager.
  - --filesystem=xdg-documents
  # "Show invoice in file manager": shell.showItemInFolder() calls
  # org.freedesktop.FileManager1.ShowItems on the session bus.
  - --talk-name=org.freedesktop.FileManager1

modules:
  - name: billance
    buildsystem: simple
    build-commands:
      - mkdir -p /app/main
      - cp -a app/. /app/main
      - patch-electron-desktop-filename /app/main/resources/app.asar --desktop-filename de.billance.billance.desktop
      - install -Dm755 billance-wrapper.sh /app/bin/billance
      - install -Dm644 app/de.billance.billance.desktop /app/share/applications/de.billance.billance.desktop
      - install -Dm644 app/de.billance.billance.metainfo.xml /app/share/metainfo/de.billance.billance.metainfo.xml
      - install -Dm644 app/de.billance.billance.svg /app/share/icons/hicolor/scalable/apps/de.billance.billance.svg
      - install -Dm644 app/LICENSE.proprietary.txt /app/share/licenses/de.billance.billance/LICENSE.proprietary.txt
    sources:
      - type: archive
        url: https://billance.de/downloads/flatpak/2026.1.1/Billance-2026.1.1-linux-x86_64-flatpak-extra-data.tar.gz
        sha256: 0ec11b43a4cc3ee5e09e25c337fe8d2fdc6374bcac31322c75ee1545f2bc874e
        dest: app
        strip-components: 0
        only-arches:
          - x86_64
      - type: archive
        url: https://billance.de/downloads/flatpak/2026.1.1/Billance-2026.1.1-linux-aarch64-flatpak-extra-data.tar.gz
        sha256: 0ddce6f1d0bb397e0f48341642cf1412cd01fc6fdcffad0b7b27a55257c3a8af
        dest: app
        strip-components: 0
        only-arches:
          - aarch64
      - type: file
        path: billance-wrapper.sh
